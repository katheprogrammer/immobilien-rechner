<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Immobilien Rechner</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: linear-gradient(135deg,#eef2f7,#e3e9f2); margin:0; }
.container { max-width:900px; margin:20px auto; padding:16px; }
.card { background:#fff; padding:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.08); margin-bottom:16px; }
h1 { text-align:center; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
@media(max-width:700px){ .grid{ grid-template-columns:1fr; } }
.field { display:flex; flex-direction:column; }
label { font-size:0.8rem; color:#777; margin-bottom:4px; }
input { width:100%; padding:12px; border-radius:12px; border:1px solid #ddd; }
input[readonly] { background:#f4f6f8; }
.result-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.positive { color:#1aa36f; font-weight:bold; }
.negative { color:#e5484d; font-weight:bold; }
.score { font-size:1.2rem; font-weight:bold; }
canvas { margin-top:20px; }
</style>
</head>
<body>
<div class="container">
<h1>🏠 Immobilien Rechner</h1>

<div class="card">
<h3>Eingaben</h3>
<div class="grid">
  <div class="field"><label>Kaufpreis</label><input id="kaufpreis" type="number"></div>
  <div class="field"><label>Nebenkosten (10%)</label><input id="nebenkosten" readonly></div>
  <div class="field"><label id="ekLabel">Eigenmittel</label><input id="eigenmittel" type="number"></div>
  <div class="field"><label>Zinssatz %</label><input id="zinssatz" type="number"></div>
  <div class="field"><label>Laufzeit (Jahre)</label><input id="laufzeit" type="number"></div>
  <div class="field"><label>Betriebskosten</label><input id="betriebskosten" type="number"></div>
  <div class="field"><label>Miete</label><input id="miete" type="number"></div>
</div>
</div>

<div class="card">
<h3>Ergebnisse</h3>
<div class="result-grid">
  <div class="field"><label>Rate</label><input id="rate" readonly></div>
  <div class="field"><label>Saldo</label><input id="saldo" readonly></div>
  <div class="field"><label>Zinskosten</label><input id="zinskosten" readonly></div>
  <div class="field"><label>Ø EK Rendite %</label><input id="ekr" readonly></div>
  <div class="field"><label>Max Kaufpreis (Break-even)</label><input id="maxkp" readonly></div>
</div>
<div id="ampel" class="score"></div>
<div id="score" class="score"></div>
</div>

<div class="card">
<h3>Visualisierung</h3>
<canvas id="zinsTilgungChart"></canvas>
<canvas id="ekChart"></canvas>
</div>

</div>

<script>
const inputs = document.querySelectorAll('input');
let chart1, chart2;

function calc(){
  const kp = +kaufpreis.value;
  const em = +eigenmittel.value;
  const zs = +zinssatz.value/100/12;
  const lj = +laufzeit.value*12;
  const bk = +betriebskosten.value;
  const mi = +miete.value;

  if(kp){
    nebenkosten.value = (kp*0.1).toFixed(0);
    ekLabel.textContent = `Eigenmittel (20%: ${(kp*0.2).toFixed(0)} €)`;
  }

  if(!em||!zs||!lj) return;

  const kredit = kp*1.1 - em;
  const rateVal = kredit*(zs*Math.pow(1+zs,lj))/(Math.pow(1+zs,lj)-1);
  rate.value = rateVal.toFixed(0);

  let rest=kredit, zinsSum=0, jahr=1;
  let labels=[], zinsenArr=[], tilgungArr=[], ekrArr=[];

  let zinsJahr=0, tilgJahr=0;

  for(let m=1;m<=lj;m++){
    let z=rest*zs;
    let t=rateVal-z;
    rest-=t;
    zinsSum+=z;

    zinsJahr += z;
    tilgJahr += t;

    if(m%12===0||rest<=0){
      labels.push("J"+jahr);
      zinsenArr.push(zinsJahr);
      tilgungArr.push(tilgJahr);

      const ek = em+kp*0.1;
      const cash=(mi*12)-(bk*12)-zinsJahr;
      const ertrag=cash+tilgJahr;
      ekrArr.push((ertrag/ek)*100);

      jahr++;
      zinsJahr=0;
      tilgJahr=0;
    }
    if(rest<=0) break;
  }

  zinskosten.value = zinsSum.toFixed(0);

  const cf=mi-bk-rateVal;
  saldo.value=cf.toFixed(0);
  saldo.className = cf >= 0 ? 'positive' : 'negative';

  // Durchschnitt EK Rendite
  const avg = ekrArr.reduce((a,b)=>a+b,0)/ekrArr.length;
  ekr.value = avg.toFixed(2);

  // Ampel
  if(cf>0) ampel.textContent="🟢 Guter Deal";
  else if(cf>-200) ampel.textContent="🟡 Grenzwertig";
  else ampel.textContent="🔴 Schlecht";

  // Score
  const ek = em + kp*0.1;
  let faktor = ek > 0 ? Math.abs(cf*12) / ek : 0;
  let scoreVal = 75;
  scoreVal += cf>0 ? faktor*200 : -faktor*200;
  scoreVal = Math.max(0, Math.min(100, scoreVal));
  score.textContent = "Score: "+Math.round(scoreVal)+"/100";

  // Kaufpreis Optimierung (Break-even = Saldo 0)
  let testKp = kp;
  for(let i=0;i<50;i++){
    let kreditTest = testKp*1.1 - em;
    let rateTest = kreditTest*(zs*Math.pow(1+zs,lj))/(Math.pow(1+zs,lj)-1);
    let cfTest = mi - bk - rateTest;
    if(cfTest > 0) testKp += 1000;
    else testKp -= 1000;
  }
  maxkp.value = testKp.toFixed(0);

  renderCharts(labels,zinsenArr,tilgungArr,ekrArr);
}

function renderCharts(labels,zinsen,tilgung,ekr){
  if(chart1) chart1.destroy();
  if(chart2) chart2.destroy();

  chart1 = new Chart(document.getElementById('zinsTilgungChart'),{
    type:'bar',
    data:{labels,datasets:[{label:'Zinsen',data:zinsen},{label:'Tilgung',data:tilgung}]}
  });

  chart2 = new Chart(document.getElementById('ekChart'),{
    type:'line',
    data:{labels,datasets:[{label:'EK Rendite %',data:ekr}]}
  });
}

inputs.forEach(i=>i.addEventListener('input',calc));
</script>
</body>
</html>
