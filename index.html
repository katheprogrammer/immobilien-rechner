<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immobilienkauf & Vermietung – Vollrechner</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; padding:20px; }
    .container { max-width:1000px; background:#fff; padding:20px; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    h1,h2 { margin-top:0; }
    label { display:block; margin-top:10px; font-weight:bold; }
    input { width:100%; padding:6px; margin-top:4px; }
    input[readonly] { background:#eee; }
    button { margin-top:10px; padding:8px; width:100%; }
    table { width:100%; border-collapse:collapse; margin-top:20px; }
    th, td { border:1px solid #ccc; padding:6px; text-align:right; }
    th { background:#eee; }
    .positive { color:green; font-weight:bold; }
    .negative { color:red; font-weight:bold; }
  </style>
</head>
<body>
<div class="container">
<h1>Immobilienkauf & Vermietung – Vollrechner</h1>

<h2>Eingaben</h2>
<label>Kaufpreis (€)</label><input id="kaufpreis" type="number">
<label>Kaufnebenkosten (10 %)</label><input id="nebenkosten" readonly>
<label>Eigenmittel (€)</label><input id="eigenmittel" type="number">
<label>Zinssatz (% p.a.)</label><input id="zinssatz" type="number" step="0.01">
<label>Laufzeit (Jahre)</label><input id="laufzeit" type="number">
<label>Betriebskosten monatlich (€)</label><input id="betriebskosten" type="number">
<label>Mieteinnahmen monatlich (€)</label><input id="miete" type="number">

<button onclick="saveData()">💾 Eingaben speichern</button>
<button onclick="loadData()">📂 Eingaben laden</button>

<h2>Ergebnisse</h2>
<label>Monatliche Rate (€)</label><input id="rate" readonly>
<label>Monatliches Saldo (Liquidität) (€)</label><input id="saldo" readonly>
<label>Restschuld (€)</label><input id="restschuld" readonly>
<label>Gesamtzinskosten (€)</label><input id="zinskosten" readonly>
<label>Eigenkapitalrendite inkl. Tilgung (% p.a.)</label><input id="ekr" readonly>
<div id="saldoText"></div>

<h2>Jährliche Aufteilung Rate (Zins & Tilgung)</h2>
<table>
  <thead>
    <tr>
      <th>Jahr</th>
      <th>Jahresrate (€)</th>
      <th>Zinsen (€)</th>
      <th>Tilgung (€)</th>
      <th>Restschuld (€)</th>
    </tr>
  </thead>
  <tbody id="jahresplan"></tbody>
</table>
</div>

<script>
const inputs = document.querySelectorAll('input');

function calc(){
  const kp = +kaufpreis.value;
  const em = +eigenmittel.value;
  const zs = +zinssatz.value / 100 / 12;
  const lj = +laufzeit.value * 12;
  const bk = +betriebskosten.value;
  const mi = +miete.value;

  if(!kp) return;
  nebenkosten.value = (kp * 0.1).toFixed(2);

  if(!em || !zs || !lj) return;
  const kredit = kp * 1.1 - em;

  const rate = kredit * (zs * Math.pow(1 + zs, lj)) / (Math.pow(1 + zs, lj) - 1);
  rate.value = rate.toFixed(2);

  let rest = kredit;
  let zinsSumme = 0;
  let zinsJahr1 = 0;
  let tilgJahr1 = 0;
  let jahresZins = 0;
  let jahresTilg = 0;
  let jahr = 1;

  jahresplan.innerHTML = "";

  for(let m = 1; m <= lj; m++){
    let zins = rest * zs;
    let tilg = rate - zins;

    rest -= tilg;
    zinsSumme += zins;
    jahresZins += zins;
    jahresTilg += tilg;

    if(m <= 12){
      zinsJahr1 += zins;
      tilgJahr1 += tilg;
    }

    if(m % 12 === 0 || rest <= 0){
      if(rest < 0) rest = 0;

      jahresplan.innerHTML += `
        <tr>
          <td>${jahr}</td>
          <td>${(rate*12).toFixed(2)}</td>
          <td>${jahresZins.toFixed(2)}</td>
          <td>${jahresTilg.toFixed(2)}</td>
          <td>${rest.toFixed(2)}</td>
        </tr>`;

      jahr++;
      jahresZins = 0;
      jahresTilg = 0;
    }

    if(rest === 0) break;
  }

  restschuld.value = rest.toFixed(2);
  zinskosten.value = zinsSumme.toFixed(2);

  if(mi && bk){
    const liquidCF = mi - bk - rate;
    saldo.value = liquidCF.toFixed(2);
    saldoText.textContent = liquidCF >= 0
      ? `Positiver Liquiditäts-Cashflow: ${liquidCF.toFixed(2)} € / Monat`
      : `Negativer Liquiditäts-Cashflow: ${liquidCF.toFixed(2)} € / Monat`;
    saldoText.className = liquidCF >= 0 ? 'positive' : 'negative';
  }

  const eingesetztesEK = em + kp * 0.1;
  if(eingesetztesEK > 0 && mi && bk){
    const cashflowOhneTilg = (mi * 12) - (bk * 12) - zinsJahr1;
    const gesamtErtrag = cashflowOhneTilg + tilgJahr1;
    ekr.value = ((gesamtErtrag / eingesetztesEK) * 100).toFixed(2);
  }
}

// 💾 Speichern
function saveData(){
  const data = {};
  inputs.forEach(i => data[i.id] = i.value);
  localStorage.setItem('immoRechner', JSON.stringify(data));
  alert('Gespeichert!');
}

// 📂 Laden
function loadData(){
  const data = JSON.parse(localStorage.getItem('immoRechner'));
  if(!data) return alert('Keine Daten gefunden');
  inputs.forEach(i => i.value = data[i.id] || '');
  calc();
}

inputs.forEach(i => i.addEventListener('input', calc));
</script>
</body>
</html>
