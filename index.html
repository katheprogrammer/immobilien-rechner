<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Immobilien Rechner</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#eef1f5; margin:0; }
    .container { max-width:900px; margin:20px auto; background:#fff; padding:20px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.08); }
    h1 { text-align:center; }
    .grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    label { font-size:0.85rem; color:#555; }
    input, select { width:100%; padding:10px; border-radius:10px; border:1px solid #ddd; }
    input[readonly] { background:#f3f3f3; }
    button { padding:10px; border:none; border-radius:10px; cursor:pointer; }
    .btn { background:#007AFF; color:#fff; }
    .btn-secondary { background:#ddd; }
    .positive { color:green; font-weight:bold; }
    .negative { color:red; font-weight:bold; }
    table { width:100%; margin-top:20px; border-collapse:collapse; }
    th, td { padding:8px; border-bottom:1px solid #eee; text-align:right; }
    th { text-align:right; }
  </style>
</head>
<body>
<div class="container">
<h1>Immobilien Rechner</h1>

<div class="grid">
  <div>
    <label>Kaufpreis</label><input id="kaufpreis" type="number">
  </div>
  <div>
    <label>Nebenkosten (10%)</label><input id="nebenkosten" readonly>
  </div>
  <div>
    <label>Eigenmittel</label><input id="eigenmittel" type="number">
  </div>
  <div>
    <label>Zinssatz %</label><input id="zinssatz" type="number">
  </div>
  <div>
    <label>Laufzeit (Jahre)</label><input id="laufzeit" type="number">
  </div>
  <div>
    <label>Betriebskosten</label><input id="betriebskosten" type="number">
  </div>
  <div>
    <label>Miete</label><input id="miete" type="number">
  </div>
</div>

<br>
<input id="projektname" placeholder="Projektname eingeben">
<button class="btn" onclick="saveData()">💾 Speichern</button>
<select id="projektliste"></select>
<button class="btn-secondary" onclick="loadData()">📂 Laden</button>

<h2>Ergebnisse</h2>
<div class="grid">
  <div><label>Rate</label><input id="rate" readonly></div>
  <div><label>Saldo</label><input id="saldo" readonly></div>
  <div><label>Zinskosten</label><input id="zinskosten" readonly></div>
  <div><label>EK Rendite %</label><input id="ekr" readonly></div>
</div>
<div id="saldoText"></div>

<h2>Jahresübersicht</h2>
<table>
<thead>
<tr><th>Jahr</th><th>Rate</th><th>Zinsen</th><th>Tilgung</th></tr>
</thead>
<tbody id="jahresplan"></tbody>
</table>
</div>

<script>
const inputs = document.querySelectorAll('input');

function calc(){
  const kp = +kaufpreis.value;
  const em = +eigenmittel.value;
  const zs = +zinssatz.value/100/12;
  const lj = +laufzeit.value*12;
  const bk = +betriebskosten.value;
  const mi = +miete.value;

  if(!kp) return;
  nebenkosten.value = (kp*0.1).toFixed(2);
  if(!em||!zs||!lj) return;

  const kredit = kp*1.1 - em;
  const rateVal = kredit*(zs*Math.pow(1+zs,lj))/(Math.pow(1+zs,lj)-1);
  rate.value = rateVal.toFixed(2);

  let rest=kredit, zinsSum=0, zinsY=0, tilgY=0, jahr=1;
  jahresplan.innerHTML="";

  for(let m=1;m<=lj;m++){
    let z=rest*zs;
    let t=rateVal-z;
    rest-=t;
    zinsSum+=z;
    zinsY+=z;
    tilgY+=t;

    if(m%12===0||rest<=0){
      jahresplan.innerHTML+=`<tr><td>${jahr}</td><td>${(rateVal*12).toFixed(0)}</td><td>${zinsY.toFixed(0)}</td><td>${tilgY.toFixed(0)}</td></tr>`;
      jahr++; zinsY=0; tilgY=0;
    }
    if(rest<=0) break;
  }

  zinskosten.value = zinsSum.toFixed(0);

  if(mi&&bk){
    const cf=mi-bk-rateVal;
    saldo.value=cf.toFixed(2);
    saldoText.textContent = cf>=0?`+${cf.toFixed(2)} €`:`${cf.toFixed(2)} €`;
    saldoText.className = cf>=0?'positive':'negative';
  }

  const ek = em+kp*0.1;
  if(ek>0 && mi && bk){
    const cash=(mi*12)-(bk*12)-zinsY;
    const ertrag=cash+tilgY;
    ekr.value=((ertrag/ek)*100).toFixed(2);
  }
}

function saveData(){
  const name = projektname.value;
  if(!name) return alert('Name eingeben');
  let all = JSON.parse(localStorage.getItem('projekte')||"{}");
  const data={}; inputs.forEach(i=>data[i.id]=i.value);
  all[name]=data;
  localStorage.setItem('projekte',JSON.stringify(all));
  updateList();
}

function loadData(){
  let all = JSON.parse(localStorage.getItem('projekte')||"{}");
  const name = projektliste.value;
  const data = all[name];
  if(!data) return;
  inputs.forEach(i=>i.value=data[i.id]||"");
  calc();
}

function updateList(){
  let all = JSON.parse(localStorage.getItem('projekte')||"{}");
  projektliste.innerHTML = Object.keys(all).map(k=>`<option>${k}</option>`).join('');
}

inputs.forEach(i=>i.addEventListener('input',calc));
updateList();
</script>
</body>
</html>
